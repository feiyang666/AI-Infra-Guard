info:
  name: OpenClaw
  cve: GHSA-3w6x-gv34-mqpf
  summary: OpenClaw Mutating internal ACP chat commands missed operator.admin scope enforcement.
  details: >-
    Summary

    Mutating internal ACP chat commands missed the operator.admin gate that should separate read-only and mutating control-plane
    actions.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - src/auto-reply/reply/commands-acp.ts now requires operator.admin for mutating internal ACP actions.

    - src/auto-reply/reply/commands-acp.test.ts ships regression coverage for non-admin denial and admin success cases.


    Thanks @tdjackey for reporting.
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - 229426a257e49694a59fa4e3895861d02a4d767f
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3w6x-gv34-mqpf
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3w6x-gv34-mqpf
