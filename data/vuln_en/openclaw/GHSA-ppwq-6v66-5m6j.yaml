info:
  name: OpenClaw
  cve: GHSA-ppwq-6v66-5m6j
  summary: OpenClaw Gateway operator.read Exposes Credentials Embedded in baseUrl Fields via config.get and channels.status.
  details: >-
    Summary

    Read-scoped gateway snapshots could expose credentials embedded in channel baseUrl and related endpoint fields.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - src/channels/account-snapshot-fields.ts now strips URL userinfo from channel status snapshot fields.

    - src/config/redact-snapshot.ts now redacts credential-bearing baseUrl and httpUrl fields while preserving safe context.


    Thanks @zpbrent for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - f0202264d0de7ad345382b9008c5963bcefb01b7
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-ppwq-6v66-5m6j
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-ppwq-6v66-5m6j
