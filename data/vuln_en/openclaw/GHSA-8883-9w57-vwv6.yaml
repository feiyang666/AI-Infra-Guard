info:
  name: OpenClaw
  cve: GHSA-8883-9w57-vwv6
  summary: OpenClaw Mattermost callback dispatch allowed non-allowlisted sender actions.
  details: >-
    Summary

    Mattermost interactive callback dispatch could run action handlers before normal sender authorization checks completed.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - extensions/mattermost/src/mattermost/interactions.ts now requires callback authorization before dispatching actions.

    - extensions/mattermost/src/mattermost/monitor.ts routes callback authorization through the same sender and allowlist
    policy used for normal ingress.


    Thanks @zpbrent for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - a47722de7e3c9cbda8d5512747ca7e3bb8f6ee66
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8883-9w57-vwv6
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8883-9w57-vwv6
