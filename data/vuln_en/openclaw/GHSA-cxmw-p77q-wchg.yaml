info:
  name: OpenClaw
  cve: GHSA-cxmw-p77q-wchg
  summary: OpenClaw Unvalidated WebView JavascriptInterface allows attacker-controlled pages to inject and execute arbitrary
    instructions via the OpenClaw Android canvas bridge
  details: >-
    Summary

    Android Canvas WebView pages from untrusted origins could invoke the JavascriptInterface bridge and inject instructions
    into the app.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - apps/android/app/src/main/java/ai/openclaw/app/ui/CanvasScreen.kt now snapshots page origin and rejects untrusted bridge
    calls.

    - apps/android/app/src/main/java/ai/openclaw/app/node/CanvasActionTrust.kt centralizes trusted origin and path validation
    for the bridge.


    Thanks @cyjhhh for reporting.
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - 8b02ef133275be96d8aac2283100016c8a7f32e5
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-cxmw-p77q-wchg
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-cxmw-p77q-wchg
