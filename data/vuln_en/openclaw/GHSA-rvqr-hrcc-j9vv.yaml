info:
  name: OpenClaw
  cve: GHSA-rvqr-hrcc-j9vv
  summary: OpenClaw TXT-only Bonjour and DNS-SD discovery metadata could still steer CLI routing when service resolution failed
  details: >-
    Summary

    Bonjour and DNS-SD TXT metadata could still steer CLI routing even when actual service resolution failed, allowing unresolved
    hints to influence the chosen target.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - src/infra/bonjour-discovery.ts now resolves and returns only concrete endpoints instead of falling back to unresolved
    TXT host and port hints.

    - src/cli/gateway-cli/discover.ts consumes only the fail-closed resolved endpoint path.


    Thanks @nexrin for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - deecf68b59a9b7eea978e40fd3c2fe543087b569
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rvqr-hrcc-j9vv
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rvqr-hrcc-j9vv
