info:
  name: OpenClaw
  cve: GHSA-rm59-992w-x2mv
  summary: OpenClaw Voice Call webhook buffered request bodies before provider signature checks, enabling bounded unauthenticated
    resource exhaustion.
  details: >-
    Summary

    Voice Call webhook handling buffered request bodies before provider signature checks, enabling bounded unauthenticated
    resource exhaustion.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - extensions/voice-call/src/webhook.ts now enforces header gating and shared pre-auth body caps before reading attacker-controlled
    request bodies.

    - extensions/voice-call/src/webhook.test.ts ships regression coverage for missing-signature, oversize, and timeout pre-auth
    webhook cases.


    Thanks @SEORY0 for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - 651dc7450b68a5396a009db78ef9382633707ead
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rm59-992w-x2mv
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rm59-992w-x2mv
