info:
  name: OpenClaw
  cve: GHSA-74wf-h43j-vvmj
  summary: OpenClaw ACP rawInput tool identity spoof could suppress dangerous-tool prompting.
  details: >-
    Summary

    ACP permission resolution trusted conflicting tool identity hints from rawInput and metadata, which could suppress dangerous-tool
    prompting.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - src/acp/client.ts now fails closed when meta, rawInput, and title tool identities conflict instead of trusting spoofable
    raw input.

    - src/acp/client.test.ts ships regressions for conflicting tool identity hints and dangerous-tool prompting.


    Thanks @zpbrent for reporting.
  cvss: ''
  severity: HIGH
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - e4c61723cd2d530680cc61789311d464ab8cdf60
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-74wf-h43j-vvmj
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-74wf-h43j-vvmj
