info:
  name: OpenClaw
  cve: GHSA-vfg3-pqpq-93m4
  summary: OpenClaw Tlon cite expansion happened before channel and DM authorization completed.
  details: >-
    Summary

    Tlon cite expansion happened before channel and DM authorization completed, allowing cite work and content handling before
    the final auth decision.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - extensions/tlon/src/monitor/index.ts now defers cite expansion until after authorization and preserves explicit empty-allowlist
    semantics.

    - extensions/tlon/src/monitor/utils.ts and extensions/tlon/src/security.test.ts ship the deferred cite expansion behavior
    and regressions.


    Thanks @zpbrent for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - 3cbf932413e41d1836cb91aed1541a28a3122f93 - ebee4e2210e1f282a982c7ef2ad79d77a572fc87
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-vfg3-pqpq-93m4
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-vfg3-pqpq-93m4
