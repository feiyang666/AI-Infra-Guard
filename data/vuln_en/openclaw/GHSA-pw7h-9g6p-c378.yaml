info:
  name: OpenClaw
  cve: GHSA-pw7h-9g6p-c378
  summary: OpenClaw Tlon settings empty-allowlist reconciliation bypassed intended revocation.
  details: >-
    Summary

    Tlon settings reconciliation treated explicit empty allowlists as unset, which could silently undo an intended deny-all
    revocation.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - extensions/tlon/src/monitor/index.ts now honors explicit empty allowlists as authoritative deny-all configuration.

    - extensions/tlon/src/monitor/settings-helpers.test.ts ships regression coverage for explicit empty settings allowlists.


    Thanks @zpbrent for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - 3cbf932413e41d1836cb91aed1541a28a3122f93
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-pw7h-9g6p-c378
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-pw7h-9g6p-c378
