info:
  name: OpenClaw
  cve: GHSA-wj55-88gf-x564
  summary: OpenClaw Queued node actions were not revalidated against current command policy.
  details: >-
    Summary

    Queued node actions were not revalidated against current command policy when later delivered, so stale allowlists or declarations
    could survive policy tightening.


    Affected Packages / Versions

    - Package: openclaw (npm)

    - Affected: < 2026.3.22

    - Fixed: >= 2026.3.22

    - Latest released tag checked: v2026.3.23-2 (630f1479c44f78484dfa21bb407cbe6f171dac87)

    - Latest published npm version checked: 2026.3.23-2


    Release Status

    The fix shipped in v2026.3.22 and remains present in v2026.3.23 and v2026.3.23-2.


    Code-Level Confirmation

    - src/gateway/server-methods/nodes.ts now revalidates queued actions against the current allowlist and declared command
    set at delivery time.

    - src/gateway/server-methods/nodes.invoke-wake.test.ts includes the shipped stale-queue regression coverage.


    Thanks @zpbrent for reporting.
  cvss: ''
  severity: MEDIUM
  security_advise: Upgrade openclaw to >= 2026.3.22 or later. Commit(s) - ec2c6d83b9f5f91d6d9094842e0f19b88e63e3e2
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-wj55-88gf-x564
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-wj55-88gf-x564
