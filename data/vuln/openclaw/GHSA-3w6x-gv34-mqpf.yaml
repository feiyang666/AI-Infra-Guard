info:
  name: OpenClaw
  cve: GHSA-3w6x-gv34-mqpf
  summary: OpenClaw 内部 ACP 聊天变更命令缺少 operator.admin 权限范围校验
  details: >-
    漏洞概述

    内部 ACP 聊天变更命令缺少 operator.admin 权限门控，导致只读操作与变更控制面操作之间的权限隔离失效。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 高危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。修复提交 - 229426a257e49694a59fa4e3895861d02a4d767f
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-3w6x-gv34-mqpf
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-3w6x-gv34-mqpf
