info:
  name: OpenClaw
  cve: GHSA-7xr2-q9vf-x4r5
  summary: OpenClaw CVE-2026-32013 不完整修复：agents.create/update 中通过 IDENTITY.md appendFile 实现的符号链接路径穿越
  details: >-
    漏洞概述

    CVE-2026-32013 的修复不完整，在 agents.create/update 操作中通过 IDENTITY.md appendFile 仍可实现符号链接路径穿越攻击。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 高危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-7xr2-q9vf-x4r5
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-7xr2-q9vf-x4r5
