info:
  name: OpenClaw
  cve: GHSA-qm9x-v7cx-7rq4
  summary: OpenClaw system.run 白名单通过未注册的时间调度包装器被绕过
  details: >-
    漏洞概述

    system.run 白名单机制可通过未注册的时间调度包装器被绕过，导致访问控制策略失效，未授权命令得以执行。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 高危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-qm9x-v7cx-7rq4
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-qm9x-v7cx-7rq4
