info:
  name: OpenClaw
  cve: GHSA-48vw-m3qc-wr99
  summary: OpenClaw 受信代理控制 UI 会话在无设备身份时可保留自声明的特权范围
  details: >-
    漏洞概述

    无设备身份的受信代理控制 UI 会话在无设备允许路径上可保留自声明的特权范围，导致权限提升风险。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 高危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。修复提交 - ccf16cd8892402022439346ae1d23352e3707e9e
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-48vw-m3qc-wr99
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-48vw-m3qc-wr99
