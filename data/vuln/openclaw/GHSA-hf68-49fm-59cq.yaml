info:
  name: OpenClaw
  cve: GHSA-hf68-49fm-59cq
  summary: OpenClaw Gateway device.pair.approve 允许 operator.pairing 权限将新设备提权至 operator.admin
  details: >-
    漏洞概述

    Gateway device.pair.approve 接口允许持有 operator.pairing 权限的用户将新设备提权至 operator.admin 级别，导致严重的权限提升漏洞。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 严重
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-hf68-49fm-59cq
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-hf68-49fm-59cq
