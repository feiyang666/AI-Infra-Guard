info:
  name: OpenClaw
  cve: GHSA-39pp-xp36-q6mg
  summary: OpenClaw Gateway 宿主机 exec 环境变量覆盖处理未一致应用共享宿主机环境策略
  details: >-
    漏洞概述

    Gateway 宿主机 exec 环境变量覆盖处理未一致应用共享宿主机环境策略，导致被阻断或格式错误的覆盖键可能通过不一致的清理路径绕过限制。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 高危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。修复提交 - 7abfff756d6c68d17e21d1657bbacbaec86de232
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-39pp-xp36-q6mg
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-39pp-xp36-q6mg
