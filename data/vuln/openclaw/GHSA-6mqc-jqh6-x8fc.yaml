info:
  name: OpenClaw
  cve: GHSA-6mqc-jqh6-x8fc
  summary: OpenClaw Gateway Canvas 本地直连请求绕过 Canvas HTTP 和 WebSocket 认证
  details: >-
    漏洞概述

    Gateway Canvas 本地直连请求可绕过 Canvas HTTP 及 WebSocket 认证机制，导致未经授权访问。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 中危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-6mqc-jqh6-x8fc
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-6mqc-jqh6-x8fc
