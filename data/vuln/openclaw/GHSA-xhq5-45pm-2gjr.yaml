info:
  name: OpenClaw
  cve: GHSA-xhq5-45pm-2gjr
  summary: OpenClaw Nextcloud Talk 房间白名单匹配冲突的房间名而非稳定的房间 token
  details: >-
    漏洞概述

    Nextcloud Talk 房间白名单校验使用可能冲突的房间名进行匹配，而非使用稳定的房间 token，导致白名单策略可被同名房间绕过。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 中危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-xhq5-45pm-2gjr
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-xhq5-45pm-2gjr
