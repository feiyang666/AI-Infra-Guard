info:
  name: OpenClaw
  cve: GHSA-rqp8-q22p-5j9q
  summary: OpenClaw Synology Chat 共享 Webhook 路径路由替换导致多账户策略上下文合并并绕过认证
  details: >-
    漏洞概述

    Synology Chat 共享 Webhook 路径的路由替换逻辑导致多账户策略上下文合并，从而绕过认证检查。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 中危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rqp8-q22p-5j9q
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rqp8-q22p-5j9q
