info:
  name: OpenClaw
  cve: GHSA-8883-9w57-vwv6
  summary: OpenClaw Mattermost 回调分发允许未在白名单中的发件人执行操作
  details: >-
    漏洞概述

    Mattermost 回调分发机制允许不在白名单中的发件人执行操作，导致访问控制策略失效。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 中危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-8883-9w57-vwv6
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-8883-9w57-vwv6
