info:
  name: OpenClaw
  cve: GHSA-ppwq-6v66-5m6j
  summary: OpenClaw Gateway operator.read 通过 config.get 和 channels.status 暴露 baseUrl 字段中的嵌入凭据
  details: >-
    漏洞概述

    Gateway operator.read 权限通过 config.get 和 channels.status 接口暴露了 baseUrl 字段中嵌入的凭据信息，导致敏感信息泄露。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 中危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-ppwq-6v66-5m6j
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-ppwq-6v66-5m6j
