info:
  name: OpenClaw
  cve: GHSA-rqpp-rjj8-7wv8
  summary: OpenClaw WebSocket 共享认证连接可自行声明提升的权限范围
  details: >-
    摘要


    OpenClaw 网关 WebSocket 连接路径存在逻辑缺陷，允许某些无设备绑定的共享令牌或密码认证后端连接，
    在未进行服务端绑定的情况下保留客户端声明的权限范围。
    使用共享密钥认证的客户端可以呈现提升的权限范围（如 operator.admin），
    尽管这些范围并未绑定到设备身份或明确受信任的 Control UI 路径。


    影响


    此问题突破了预期的授权边界，可能允许使用共享密钥认证的后端客户端执行仅限管理员的网关操作。


    受影响版本


    openclaw <= 2026.3.11


    修复方案


    已在 openclaw 2026.3.12 中修复。网关现在会清除非 Control UI 共享认证连接的未绑定权限范围，
    并针对无设备的共享认证路径添加了回归测试。
  cvss: CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:H/A:H
  severity: CRITICAL
  security_advise: 升级 openclaw 至 2026.3.12 或更高版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rqpp-rjj8-7wv8
rule: version <= "2026.3.11"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rqpp-rjj8-7wv8
