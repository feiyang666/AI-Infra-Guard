info:
  name: OpenClaw
  cve: GHSA-g2f6-pwvx-r275
  summary: OpenClaw 未经过滤的 iMessage 附件路径允许 SCP 远程路径命令注入
  details: >-
    摘要

    openclaw <= 2026.3.12 版本在通过 SCP 暂存文件时接受了未经过滤的 iMessage 远程附件路径，允许远程路径操作数中包含 shell 元字符。


    受影响软件包 / 版本

    - 软件包：openclaw (npm)

    - 受影响版本：<= 2026.3.12

    - 修复版本：2026.3.13


    详情

    漏洞路径位于 src/auto-reply/reply/stage-sandbox-media.ts 中的远程附件暂存流程。当 ctx.MediaRemoteHost 被设置时，OpenClaw 通过对 <remoteHost>:<remotePath> 执行 /usr/bin/scp 来暂存附件。在受影响版本中，远程主机经过了规范化处理，但远程附件路径在传递给 SCP 远程操作数之前未对 shell 元字符进行校验。因此，当启用远程附件暂存功能时，包含 shell 元字符的发送方可控 iMessage 附件文件名可能在配置的远程主机上触发命令执行。


    此问题属于 OpenClaw 信任模型的覆盖范围，因为它跨越了入站内容边界，在已配置的远程附件主机上触发了主机命令执行。


    修复方案

    openclaw@2026.3.13 在执行 scp 之前对 SCP 远程路径进行校验。当前代码调用 normalizeScpRemotePath(...) 并拒绝包含 shell 元字符的路径，而不再将其直接传递给远程 shell。


    回归测试覆盖位于 src/auto-reply/reply.stage-sandbox-media.scp-remote-path.test.ts（在执行 scp 之前拒绝包含 shell 元字符的远程附件文件名）。
  cvss: ''
  severity: MEDIUM
  security_advise: 升级 openclaw 至 >= 2026.3.13 或更高版本。openclaw@2026.3.13 在执行 scp 之前对 SCP 远程路径进行校验。当前代码调用 normalizeScpRemotePath(...) 并拒绝包含 shell 元字符的路径，不再将其直接传递给远程 shell。回归测试覆盖位于 src/auto-reply/reply.stage-sandbox-media.scp-remote-path.test.ts。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g2f6-pwvx-r275
rule: version <= "2026.3.12"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-g2f6-pwvx-r275
