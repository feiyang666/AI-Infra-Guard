info:
  name: OpenClaw
  cve: GHSA-rvqr-hrcc-j9vv
  summary: OpenClaw 仅文本的 Bonjour 和 DNS-SD 发现元数据在服务解析失败时仍可引导 CLI 路由
  details: >-
    漏洞概述

    仅包含 TXT 记录的 Bonjour 和 DNS-SD 发现元数据在服务解析失败时仍可引导 CLI 路由，导致路由被恶意元数据操控。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 中危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-rvqr-hrcc-j9vv
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-rvqr-hrcc-j9vv
