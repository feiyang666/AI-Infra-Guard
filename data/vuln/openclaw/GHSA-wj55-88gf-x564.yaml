info:
  name: OpenClaw
  cve: GHSA-wj55-88gf-x564
  summary: OpenClaw 排队的节点操作未针对当前命令策略重新验证
  details: >-
    漏洞概述

    排队等待执行的节点操作未针对当前有效的命令策略进行重新验证，导致策略变更后已入队的操作仍可绕过新策略执行。

    受影响版本

    - 包名：openclaw (npm)
    - 受影响：< 2026.3.22
    - 修复版本：>= 2026.3.22
  cvss: ''
  severity: 中危
  security_advise: 升级 openclaw 至 >= 2026.3.22 版本。
  references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-wj55-88gf-x564
rule: version < "2026.3.22"
references:
- https://github.com/openclaw/openclaw/security/advisories/GHSA-wj55-88gf-x564
